dataset:
  name: vivid
  root: /media/jhlee/EVO4TB/vivid_projects/data
  sequences: [campus_day1, campus_day2]
  depth_cache_dir: cache/depth/vivid
  pos_threshold: 25.0          # meters (evaluation GT)

model:
  num_clusters: 16
  encoder_dim: 512

train:
  sequences: [campus_day1, campus_day2]   # training sequences (both modalities)
  range_subsample: 10          # use every 10th range frame
  depth_subsample: 10          # use every 10th depth frame
  batch_size: 4
  cache_batch_size: 64         # batch size for descriptor extraction
  patience: 10

  # Phase 1: GeM + Contrastive Loss
  phase1_epochs: 20
  phase1_lr: 0.001
  contrastive_tau: 1.0
  n_crops: 1                   # 1 = full camera-view image (no panoramic crop)
  crop_fov_deg: 90.0           # actual FoV of camera-view range
  scale_augment_pct: 20.0

  # Phase 2: NetVLAD + Triplet Loss (Section III.B.4)
  phase2_frozen_epochs: 5      # freeze encoder, train only NetVLAD centroids+conv
  phase2_frozen_lr: 0.001      # higher LR for fast VLAD cluster adaptation
  phase2_epochs: 25            # unfreeze conv5, joint training
  phase2_lr: 0.0001            # lower LR for fine-tuning

  # Triplet mining (Phase 2)
  pos_dist_thr: 10.0           # meters: positives within this distance
  neg_dist_thr: 25.0           # meters: negatives beyond this distance
  n_neg: 5                     # hard negatives per triplet
  margin: 0.1                  # triplet margin m=0.1 (paper Section IV.A)

  # Optimizer
  optimizer: sgd
  momentum: 0.9
  weight_decay: 0.001
  lr_step: 5                   # halve LR every 5 epochs
  lr_gamma: 0.5

val:
  sequences: [campus_day2]     # validation sequence
  batch_size: 64
  recall_ks: [1, 5, 10]
  top_k: 10

eval:
  batch_size: 64
  top_k: 25
  recall_ks: [1, 5, 10, 15, 20]
  num_workers: 4

input:
  resize: [480, 640]             # NetVLAD needs large feature maps (30x40=1200 spatial positions)
  # range_npy is disparity — normalize_disparity gives [0,1] min-max (close=bright)
