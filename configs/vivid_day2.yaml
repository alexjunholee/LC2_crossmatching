dataset:
  name: vivid
  root: /media/jhlee/EVO4TB/vivid_projects/data
  sequences: [campus_day2]
  query_modality: range       # LiDAR range images
  db_modality: depth           # Camera depth maps (DA3)
  depth_cache_dir: cache/depth/vivid
  pos_threshold: 25.0          # meters

model:
  num_clusters: 16
  encoder_dim: 512
  checkpoint: pretrained/dual_encoder.pth.tar

input:
  resize: [480, 640]

eval:
  batch_size: 64
  top_k: 25
  recall_ks: [1, 5, 10, 15, 20]
  pos_thresholds: [5.0, 10.0, 25.0]
  num_workers: 4
